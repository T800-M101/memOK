<form [formGroup]="requestForm">
  <div class="request-bar">
    <mat-form-field appearance="outline" class="method-field">
      <mat-select formControlName="method">
        <mat-option value="GET">GET</mat-option>
        <mat-option value="POST">POST</mat-option>
        <mat-option value="PUT">PUT</mat-option>
        <mat-option value="DELETE">DELETE</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline" class="url-field">
      <mat-label>Request URL</mat-label>
      <input matInput placeholder="https://api.example.com/users" formControlName="url" (input)="onUrlInput($event)" />
    </mat-form-field>
    <button type="button" mat-flat-button class="send-btn" (click)="sendRequest()">Send</button>
  </div>
</form>
