<mat-tab-group class="request-config-tabs">
  <mat-tab label="Params">
    <div class="tab-content">
      <table class="params-table">
        <thead><tr><th>KEY</th><th>VALUE</th><th>DESCRIPTION</th></tr></thead>
        <tbody>
          <tr>
            <td><input placeholder="page" (input)="onInput()" /></td>
            <td><input placeholder="1"  (input)="onInput()"/></td>
            <td><input placeholder="Pagination" (input)="onInput()" /></td>
          </tr>
        </tbody>
      </table>
    </div>
  </mat-tab>
  <mat-tab label="Headers"><div class="tab-content">Headers content</div></mat-tab>
  <mat-tab label="Authorization">
    <div class="tab-content">
      <mat-form-field appearance="outline" class="url-field">
        <mat-label>Bearer Token</mat-label>
        <input matInput placeholder="your-token" />
      </mat-form-field>
    </div>
  </mat-tab>
  <mat-tab label="Body">
    <div class="tab-content">
      <mat-form-field appearance="outline" class="body-editor">
        <mat-label>JSON Body</mat-label>
        <textarea matInput rows="12" placeholder="JSON body" (input)="onInput()" ></textarea>
      </mat-form-field>
    </div>
  </mat-tab>
</mat-tab-group>
