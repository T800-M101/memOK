<main class="workspace">

  <mat-tab-group [selectedIndex]="selectedTabIndex()" (selectedIndexChange)="setActiveTab($event)"
    animationDuration="0ms">

    @for ( request of activeRequests(); track request.requestId; let i = $index ) {
    <mat-tab>
      <ng-template mat-tab-label>
        <span class="tab-label"> {{ request.name }} </span>
        <button class="close-btn" (click)="closeTab(i); $event.stopPropagation()">
          <i class="fas fa-times"></i>
        </button>

      </ng-template>

      <div class="request-page">
        <app-request-bar [requestData]="request" />
        <app-config-tabs [requestData]="request" />
        <app-response-section [requestData]="request" />
      </div>
    </mat-tab>
    }

    <!-- Persistent + tab -->
    <mat-tab>

      <ng-template mat-tab-label>
        <button class="add-tab-btn" (click)="createNewTab($event)">
          <i class="fas fa-plus"></i>
        </button>
      </ng-template>
    </mat-tab>
  </mat-tab-group>

</main>
