<aside class="sidebar">
  <button mat-flat-button class="new-request-btn" (click)="openModal()">
    <mat-icon>add</mat-icon> New Collection
  </button>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search collections</mat-label>
    <mat-icon matPrefix>search</mat-icon>
    <input matInput />
  </mat-form-field>

  <div class="collections">
    <div class="collection-title">Collections</div>
    <mat-expansion-panel expanded>
      <mat-expansion-panel-header>
        <mat-panel-title>Users API</mat-panel-title>
      </mat-expansion-panel-header>
      <div class="request-list">
        <button mat-button class="request-item get"><span class="method">GET</span></button>
        <button mat-button class="request-item post"><span class="method">POST</span></button>
        <button mat-button class="request-item put"><span class="method">PUT</span></button>
        <button mat-button class="request-item delete"><span class="method">DELETE</span></button>
      </div>
    </mat-expansion-panel>
  </div>
</aside>


@if(isModalOpen()){
<div class="modal-overlay">
  <div class="modal-card">

    <!-- Header -->
    <div class="modal-header-custom">
      <h5 class="mb-0">
        <i class="fas fa-folder-plus me-2"></i>
        Add Collection
      </h5>

    <button
      type="button"
      class="modal-close-btn"
      aria-label="Close" (click)="closeModal()">
      <i class="fas fa-times"></i>
    </button>
    </div>

    <!-- Body -->
    <div class="modal-body-custom">

      <label class="form-label">
        Collection name
      </label>

      <input type="text" class="form-control collection-input" placeholder="e.g. Users API" />

    </div>

    <!-- Footer -->
    <div class="modal-footer-custom">

      <button class="btn btn-light cancel-btn">
        Cancel
      </button>

      <button class="btn create-btn" (click)="addCollection()">

        <i class="fas fa-plus me-2"></i>
        Create Collection

      </button>

    </div>

  </div>
</div>
}
