<mat-toolbar class="topbar">
  <button mat-icon-button  (click)="toggleMenu()" aria-label="Open lateral menu">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="logo-section">
    <i class="fas fa-cloud text-white fs-4"></i>
    <span class="logo-text">MemOK Client</span>
  </div>

  <span class="spacer"></span>

  <button mat-icon-button>
    <mat-icon>history</mat-icon>
  </button>
  <button mat-icon-button>
    <mat-icon>settings</mat-icon>
  </button>
  <button mat-mini-fab>
    <mat-icon>person</mat-icon>
  </button>
</mat-toolbar>

<div class="lateral-menu" [class.open]="isMenuOpen()">
  <div class="menu-content">
    <button mat-flat-button class="import-curl-btn" (click)="importCurl()">Import cURL</button>
  </div>
</div>

<div class="menu-backdrop" *ngIf="isMenuOpen()" (click)="closeMenu()"></div>
