<div class="api-client">

  <!-- TOPBAR -->
  <mat-toolbar class="topbar">

    <button mat-icon-button>
      <mat-icon>menu</mat-icon>
    </button>

    <div class="logo-section">
      <i class="fas fa-cloud text-white fs-4"></i>
      <span class="logo-text">
        MemOK Client
      </span>
    </div>

    <span class="spacer"></span>

    <button mat-icon-button>
      <mat-icon>history</mat-icon>
    </button>

    <button mat-icon-button>
      <mat-icon>settings</mat-icon>
    </button>

    <button mat-mini-fab>
      <mat-icon>person</mat-icon>
    </button>

  </mat-toolbar>

  <div class="content-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <button mat-flat-button class="new-request-btn">
        <mat-icon>add</mat-icon>
        New Request
      </button>

      <mat-form-field appearance="outline" class="search-field">
        <mat-label>
          Search collections
        </mat-label>

        <mat-icon matPrefix>
          search
        </mat-icon>

        <input matInput />
      </mat-form-field>

      <div class="collections">

        <div class="collection-title">
          Collections
        </div>

        <!-- COLLECTION -->
        <mat-expansion-panel expanded>

          <mat-expansion-panel-header>
            <mat-panel-title>
              Users API
            </mat-panel-title>
          </mat-expansion-panel-header>

          <div class="request-list">

            <button mat-button class="request-item get">
              <span class="method">
                GET
              </span>


            </button>

            <button mat-button class="request-item post">
              <span class="method">
                POST
              </span>


            </button>

            <button mat-button class="request-item put">
              <span class="method">
                PUT
              </span>


            </button>

            <button mat-button class="request-item delete">
              <span class="method">
                DELETE
              </span>


            </button>

          </div>

        </mat-expansion-panel>

      </div>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="workspace">

      <mat-tab-group>

        <mat-tab label="GET Users">

          <div class="request-page">

            <!-- REQUEST BAR -->
            <div class="request-bar">

              <mat-form-field appearance="outline" class="method-field">
                <mat-select value="GET">

                  <mat-option value="GET">
                    GET
                  </mat-option>

                  <mat-option value="POST">
                    POST
                  </mat-option>

                  <mat-option value="PUT">
                    PUT
                  </mat-option>

                  <mat-option value="DELETE">
                    DELETE
                  </mat-option>

                </mat-select>
              </mat-form-field>

              <mat-form-field appearance="outline" class="url-field">
                <mat-label>
                  Request URL
                </mat-label>

                <input matInput placeholder="https://api.example.com/users" />
              </mat-form-field>

              <button mat-flat-button class="send-btn">
                Send
              </button>

            </div>

            <!-- CONFIG TABS -->
            <mat-tab-group class="request-config-tabs">

              <!-- PARAMS -->
              <mat-tab label="Params">

                <div class="tab-content">

                  <table class="params-table">

                    <thead>
                      <tr>
                        <th>KEY</th>
                        <th>VALUE</th>
                        <th>DESCRIPTION</th>
                      </tr>
                    </thead>

                    <tbody>

                      <tr>

                        <td>
                          <input placeholder="page" />
                        </td>

                        <td>
                          <input placeholder="1" />
                        </td>

                        <td>
                          <input placeholder="Pagination" />
                        </td>

                      </tr>

                    </tbody>

                  </table>

                </div>

              </mat-tab>

              <!-- HEADERS -->
              <mat-tab label="Headers">

                <div class="tab-content">

                  Headers content

                </div>

              </mat-tab>

              <!-- AUTH -->
              <mat-tab label="Authorization">

                <div class="tab-content">

                  <mat-form-field appearance="outline" class="url-field">
                    <mat-label>
                      Bearer Token
                    </mat-label>

                    <input matInput placeholder="your-token" />
                  </mat-form-field>

                </div>

              </mat-tab>

              <!-- BODY -->
              <mat-tab label="Body">

                <div class="tab-content">

                  <mat-form-field appearance="outline" class="body-editor">

                    <mat-label>
                      JSON Body
                    </mat-label>

                    <textarea matInput rows="12" placeholder="JSON body">
                    </textarea>

                  </mat-form-field>

                </div>

              </mat-tab>

            </mat-tab-group>

            <!-- RESPONSE -->
            <section class="response-section">

              <div class="response-header">

                <div class="response-meta">
                  <span>Status: 200 OK</span>
                  <span>Time: 120ms</span>
                  <span>Size: 1.2KB</span>
                </div>

                <button mat-button>
                  Save Response
                </button>

              </div>

              <div class="response-body">

                <pre>
No response yet
    </pre>

              </div>

            </section>

          </div>

        </mat-tab>

      </mat-tab-group>

    </main>

  </div>

</div>
